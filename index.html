<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Selfie da Frequência</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 560px;
        margin: 32px auto;
        padding: 20px;
        line-height: 1.5;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      .box {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        background: #f2f2f2;
      }

      .erro { color: #b00020; }
      .ok { color: #0a6b2d; }
      .small { font-size: 12px; color: #666; }

      button {
        width: 100%;
        display: inline-block;
        box-sizing: border-box;
        margin-top: 20px;
        padding: 14px 12px;
        border: none;
        border-radius: 8px;
        text-align: center;
        font-size: 16px;
        cursor: pointer;
        background: #1a73e8;
        color: #fff;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      button.secundario {
        background: #5f6368;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      #camera,
      #previewSelfie {
        display: none;
        width: 100%;
        margin-top: 10px;
        border-radius: 8px;
        background: #000;
      }

      #canvasSelfie {
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>Selfie da Frequência</h2>

    <p id="identificacao" class="small"></p>

    <div class="box">
      <p>
        Tire uma selfie para validar sua frequência.
      </p>

      <video id="camera" autoplay playsinline muted></video>
      <canvas id="canvasSelfie"></canvas>
      <img id="previewSelfie" alt="Prévia da selfie">

      <button id="btnAbrirCamera" type="button">Abrir câmera para selfie</button>
      <button id="btnTirarFoto" type="button" style="display:none;">Tirar foto</button>
      <button id="btnRefazerFoto" type="button" class="secundario" style="display:none;">Refazer selfie</button>
      <button id="btnEnviar" type="button" style="display:none;">Enviar selfie</button>
    </div>

    <div id="status" class="box small">
      O navegador pedirá permissão para usar a câmera.
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);

      const TOKEN = params.get('token') || '';
      const APPS_SCRIPT_POST_URL = params.get('app') || '';
      const NOME = params.get('nome') || '';
      const RA = params.get('ra') || '';

      const btnAbrirCamera = document.getElementById('btnAbrirCamera');
      const btnTirarFoto = document.getElementById('btnTirarFoto');
      const btnRefazerFoto = document.getElementById('btnRefazerFoto');
      const btnEnviar = document.getElementById('btnEnviar');

      let streamCamera = null;
      let selfieBase64 = '';

      btnAbrirCamera.addEventListener('click', abrirCamera);
      btnTirarFoto.addEventListener('click', tirarFoto);
      btnRefazerFoto.addEventListener('click', refazerFoto);
      btnEnviar.addEventListener('click', enviarSelfie);

      document.getElementById('identificacao').textContent =
        (NOME || 'Aluno') + (RA ? ' | RA: ' + RA : '');

      validarParametrosIniciais();

      function validarParametrosIniciais() {
        if (!TOKEN || !APPS_SCRIPT_POST_URL) {
          setStatus('Link inválido. Volte para a página inicial de frequência e tente novamente.', 'erro');
          desabilitarTudo();
        }
      }

      function setStatus(msg, tipo) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'box ' + (tipo || '') + ' small';
      }

      function desabilitarTudo() {
        btnAbrirCamera.disabled = true;
        btnTirarFoto.disabled = true;
        btnRefazerFoto.disabled = true;
        btnEnviar.disabled = true;
      }

      async function abrirCamera() {
        if (!TOKEN || !APPS_SCRIPT_POST_URL) {
          setStatus('Link inválido. Volte para a página inicial de frequência.', 'erro');
          return;
        }

        if (!window.isSecureContext) {
          setStatus('A câmera só funciona em página HTTPS.', 'erro');
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus('Este navegador não permite abrir a câmera diretamente. Use o Google Chrome atualizado.', 'erro');
          return;
        }

        try {
          pararCamera();

          selfieBase64 = '';

          const video = document.getElementById('camera');
          const preview = document.getElementById('previewSelfie');

          preview.style.display = 'none';
          video.style.display = 'block';

          btnAbrirCamera.disabled = true;
          btnAbrirCamera.textContent = 'Abrindo câmera...';

          streamCamera = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: 'user' },
              width: { ideal: 640 },
              height: { ideal: 480 }
            },
            audio: false
          });

          video.srcObject = streamCamera;

          await esperarVideoCarregar(video);
          await video.play();

          btnAbrirCamera.style.display = 'none';
          btnAbrirCamera.disabled = false;
          btnAbrirCamera.textContent = 'Abrir câmera para selfie';

          btnTirarFoto.style.display = 'inline-block';
          btnRefazerFoto.style.display = 'none';
          btnEnviar.style.display = 'none';

          setStatus('Câmera aberta. Centralize o rosto e clique em "Tirar foto".', '');
        } catch (e) {
          pararCamera();

          btnAbrirCamera.disabled = false;
          btnAbrirCamera.textContent = 'Abrir câmera para selfie';

          document.getElementById('camera').style.display = 'none';

          setStatus('Não foi possível acessar a câmera: ' + traduzirErroCamera(e), 'erro');
        }
      }

      function esperarVideoCarregar(video) {
        return new Promise(function(resolve, reject) {
          if (video.readyState >= 2 && video.videoWidth > 0) {
            resolve();
            return;
          }

          const timer = setTimeout(function() {
            reject(new Error('Tempo esgotado ao carregar o vídeo da câmera.'));
          }, 8000);

          video.onloadedmetadata = function() {
            clearTimeout(timer);
            resolve();
          };

          video.onerror = function() {
            clearTimeout(timer);
            reject(new Error('Erro ao carregar o vídeo da câmera.'));
          };
        });
      }

      function traduzirErroCamera(e) {
        const nome = e && e.name ? e.name : '';
        const msg = e && e.message ? e.message : '';

        if (nome === 'NotAllowedError' || nome === 'PermissionDeniedError') {
          return 'permissão negada. Autorize a câmera no navegador.';
        }

        if (nome === 'NotFoundError' || nome === 'DevicesNotFoundError') {
          return 'nenhuma câmera foi encontrada no dispositivo.';
        }

        if (nome === 'NotReadableError' || nome === 'TrackStartError') {
          return 'a câmera está sendo usada por outro aplicativo ou não conseguiu ser iniciada.';
        }

        if (nome === 'OverconstrainedError' || nome === 'ConstraintNotSatisfiedError') {
          return 'a câmera não atende às configurações solicitadas.';
        }

        if (nome === 'SecurityError') {
          return 'o navegador bloqueou a câmera por segurança.';
        }

        return msg || 'erro desconhecido ao abrir a câmera.';
      }

      function tirarFoto() {
        const video = document.getElementById('camera');

        if (!video.videoWidth || !video.videoHeight) {
          setStatus('A câmera ainda não está pronta. Tente novamente em alguns segundos.', 'erro');
          return;
        }

        gerarSelfieComMarcacao(video, video.videoWidth, video.videoHeight);

        video.style.display = 'none';
        pararCamera();

        btnTirarFoto.style.display = 'none';
        btnRefazerFoto.style.display = 'inline-block';
        btnEnviar.style.display = 'inline-block';
        btnAbrirCamera.style.display = 'none';

        setStatus('Selfie registrada. Confira a imagem e clique em enviar.', 'ok');
      }

      function refazerFoto() {
        selfieBase64 = '';
        document.getElementById('previewSelfie').style.display = 'none';
        document.getElementById('camera').style.display = 'none';

        btnRefazerFoto.style.display = 'none';
        btnEnviar.style.display = 'none';
        btnTirarFoto.style.display = 'none';
        btnAbrirCamera.style.display = 'inline-block';

        abrirCamera();
      }

      function pararCamera() {
        if (streamCamera) {
          streamCamera.getTracks().forEach(function(track) {
            track.stop();
          });
          streamCamera = null;
        }
      }

      function gerarSelfieComMarcacao(origem, larguraOriginal, alturaOriginal) {
        const canvas = document.getElementById('canvasSelfie');
        const preview = document.getElementById('previewSelfie');
        const maxLargura = 640;

        let largura = larguraOriginal;
        let altura = alturaOriginal;

        if (largura > maxLargura) {
          const escala = maxLargura / largura;
          largura = Math.round(largura * escala);
          altura = Math.round(altura * escala);
        }

        canvas.width = largura;
        canvas.height = altura;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(origem, 0, 0, largura, altura);

        const agora = new Date().toLocaleString('pt-BR', {
          timeZone: 'America/Belem'
        });

        const faixaAltura = Math.max(72, Math.round(altura * 0.15));

        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
        ctx.fillRect(0, altura - faixaAltura, largura, faixaAltura);

        ctx.fillStyle = '#ffffff';
        ctx.font = Math.max(14, Math.round(largura * 0.028)) + 'px Arial';

        ctx.fillText('Frequência - ' + agora, 12, altura - faixaAltura + 28);
        ctx.fillText((NOME || 'Aluno') + (RA ? ' | RA: ' + RA : ''), 12, altura - faixaAltura + 56);

        selfieBase64 = canvas.toDataURL('image/jpeg', 0.82);

        preview.src = selfieBase64;
        preview.style.display = 'block';
      }

      function enviarSelfie() {
        if (!selfieBase64) {
          setStatus('Tire a selfie antes de enviar.', 'erro');
          return;
        }

        btnEnviar.disabled = true;
        btnRefazerFoto.disabled = true;
        setStatus('Enviando selfie...', '');

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = APPS_SCRIPT_POST_URL;
        form.style.display = 'none';

        adicionarCampo(form, 'action', 'salvarSelfie');
        adicionarCampo(form, 'token', TOKEN);
        adicionarCampo(form, 'selfieBase64', selfieBase64);

        document.body.appendChild(form);
        form.submit();
      }

      function adicionarCampo(form, nome, valor) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = nome;
        input.value = valor == null ? '' : String(valor);
        form.appendChild(input);
      }
    </script>
  </body>
</html>
